name: 'dbt_tutorial'
version: '1.0.0'
config-version: 2

profile: 'dbt_tutorial'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_tutorial:
    bronze:
      +materialized: table
      +schema: bronze

    silver:
      +materialized: table
      +schema: silver

    gold:
      +materialized: table
      +schema: gold